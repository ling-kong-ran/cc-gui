<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CCB GUI</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>CCB</h1>
        <p>Claude Code Best</p>
      </div>

      <!-- 新建会话 -->
      <div class="sidebar-section">
        <button id="btn-new-session" class="btn btn-primary">+ 新建会话</button>
      </div>

      <!-- 模型选择 -->
      <!-- CLI 选择 -->
      <div class="sidebar-section">
        <label>CLI 程序</label>
        <select id="cli-select" class="select"></select>
      </div>

      <div class="sidebar-section">
        <label>模型</label>
        <select id="model-select" class="select">
          <option value="claude-opus-4-6">Opus 4.6</option>
          <option value="claude-sonnet-4-6" selected>Sonnet 4.6</option>
          <option value="claude-haiku-4-6">Haiku 4.6</option>
        </select>
      </div>

      <!-- 权限模式 -->
      <div class="sidebar-section">
        <label class="toggle-label">
          <input type="checkbox" id="skip-permissions" checked>
          <span>跳过权限确认</span>
        </label>
      </div>

      <!-- 工作目录 -->
      <div class="sidebar-section">
        <label>工作目录</label>
        <div class="cwd-wrapper">
          <input id="cwd-input" type="text" class="input cwd-input" placeholder="点击选择或输入路径...">
          <button id="btn-browse" class="btn-browse" title="浏览目录">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
          </button>
        </div>
      </div>

      <!-- 历史会话 -->
      <div class="sidebar-section session-section">
        <label>历史会话</label>
        <div id="session-list" class="session-list"></div>
      </div>

      <!-- 导航 -->
      <nav class="nav">
        <button class="nav-btn active" data-page="chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          对话
        </button>
        <button class="nav-btn" data-page="config">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          配置
        </button>
      </nav>

      <!-- 状态栏 -->
      <div class="status-bar">
        <div id="connection-status">
          <span class="status-dot offline"></span>
          <span class="status-text">未连接</span>
        </div>
        <div id="cost-display" style="display:none; margin-top:6px;">
          费用: $<span id="cost-value">0.0000</span>
        </div>
      </div>
    </aside>

    <!-- 主内容 -->
    <main class="main">
      <!-- 对话页 -->
      <div id="page-chat" class="page active">
        <div id="messages" class="messages">
          <div class="welcome-msg">
            <h2>Welcome to CCB</h2>
            <p>选择模型，点击「新建会话」开始对话</p>
          </div>
        </div>
        <div class="input-area">
          <div id="attachments-bar" class="attachments-bar" style="display:none"></div>
          <div class="input-wrapper">
            <button id="btn-attach" class="btn-attach" title="添加文件">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
            </button>
            <textarea id="message-input" placeholder="输入消息... (Enter 发送, Shift+Enter 换行, 可粘贴图片)" rows="1"></textarea>
            <div class="input-actions">
              <button id="btn-send" class="btn-send" disabled>发送</button>
              <button id="btn-stop" class="btn-stop">停止</button>
            </div>
          </div>
          <input type="file" id="file-input" multiple style="display:none">
        </div>
      </div>

      <!-- 配置页 -->
      <div id="page-config" class="page config-page">
        <h2>配置管理</h2>
        <section class="config-section">
          <h3>环境变量</h3>
          <div class="config-card">
            <div id="env-fields"></div>
            <button id="btn-save-env" class="btn-save">保存修改</button>
          </div>
        </section>
        <section class="config-section">
          <h3>Skills</h3>
          <div id="skills-list" class="config-card">
            <p class="empty-state">加载中...</p>
          </div>
        </section>
        <section class="config-section">
          <h3>Agents</h3>
          <div id="agents-list" class="config-card">
            <p class="empty-state">加载中...</p>
          </div>
        </section>
      </div>
    </main>
  </div>

  <!-- 目录选择器弹窗 -->
  <div id="dir-picker-overlay" class="picker-overlay" style="display:none">
    <div class="picker-modal">
      <div class="picker-header">
        <h3>选择工作目录</h3>
        <button id="picker-close" class="picker-close">&times;</button>
      </div>
      <div class="picker-path">
        <button id="picker-up" class="picker-up" title="上级目录">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <span id="picker-current-path" class="picker-current">/</span>
      </div>
      <div id="picker-list" class="picker-list"></div>
      <div class="picker-footer">
        <button id="picker-select" class="btn btn-primary" style="width:auto; padding:8px 24px;">选择此目录</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
